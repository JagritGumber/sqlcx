name: Feature request
description: Propose a new sqlcx feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem are you trying to solve? Concrete example beats abstract description.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: What's explicitly NOT in this request. Helps reviewers gauge.
