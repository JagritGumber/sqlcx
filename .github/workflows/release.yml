name: Release

# Triggered on tag push matching v*.*.* (e.g. v0.2.0). The tag must
# already exist — typically created after D20 bumps Cargo.toml +
# package.json versions and the tag is pushed.
#
# Publishes:
#   - crates.io: sqlcx-core then sqlcx (core is a dependency of the CLI)
#   - GitHub Release with CHANGELOG excerpt attached
#
# npm binary distribution is NOT published here — that needs a
# per-platform build matrix (darwin-arm64, darwin-x64, linux-x64-gnu,
# linux-arm64-gnu, win32-x64-msvc) which is a separate follow-up.

on:
  push:
    tags: ["v*.*.*"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  verify:
    name: Verify tag matches workspace version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Check Cargo.toml version matches tag
        run: |
          cargo_version=$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          if [ "$cargo_version" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::Cargo.toml version ($cargo_version) does not match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi
      - name: Check package.json version matches tag
        run: |
          pkg_version=$(node -e 'console.log(require("./package.json").version)')
          if [ "$pkg_version" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::package.json version ($pkg_version) does not match tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

  test:
    name: Run full test suite before publishing
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tests/typecheck/package-lock.json
            tests/typecheck-zod3/package-lock.json
      - run: |
          npm --prefix tests/typecheck ci
          npm --prefix tests/typecheck-zod3 ci
          npm install -g typescript@5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Populate go.sum for the typecheck-go scaffold
        # Mirror of the ci.yml step. `go build` needs go.sum covering pgx's
        # transitive graph; `go mod tidy` walks anchor.go to write it.
        working-directory: tests/typecheck-go
        run: go mod tidy
      - run: cargo fmt --all -- --check
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
        env:
          INSTA_UPDATE: "no"
          INSTA_FORCE_PASS: "0"
      - run: cargo clippy --workspace --all-targets -- -D warnings

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Publish sqlcx-core
        run: cargo publish -p sqlcx-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for sqlcx-core to be indexed
        # crates.io indexing can lag ~30-60s. `cargo publish -p sqlcx-orm`
        # would otherwise fail to resolve its dependency on the freshly
        # published core.
        run: sleep 60
      - name: Publish sqlcx-orm
        run: cargo publish -p sqlcx-orm --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-crates
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract CHANGELOG excerpt for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Find the section for this version between `## [x.y.z]` headings.
          awk -v v="$version" '
            /^## \[/ {
              if (found) exit;
              if (index($0, "[" v "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release_body.md
          # If extraction returned nothing, fall back to a generic message.
          if [ ! -s release_body.md ]; then
            echo "Release $version" > release_body.md
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
